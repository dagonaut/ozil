# Last Modified: 2026-04-22
# Status: Active
# Deploy FIRST — outputs CertificateArn used by api.yaml
#
# Commands:
#   aws cloudformation deploy \
#     --template-file cloudformation/hosting.yaml \
#     --stack-name ozil-hosting \
#     --parameter-overrides HostedZoneId=<YOUR_ZONE_ID> \
#     --region us-east-1
#
# After deploy, sync the frontend:
#   aws s3 sync app/ s3://ozil-site/ --delete --region us-east-1
# Then invalidate the CloudFront cache:
#   aws cloudfront create-invalidation --distribution-id <DIST_ID> --paths "/*"

AWSTemplateFormatVersion: '2010-09-09'
Description: Ozil Dog Tracker - Hosting (ACM + S3 + CloudFront + Route53)

Parameters:
  HostedZoneId:
    Type: String
    Description: Route 53 Hosted Zone ID for ozil.cc

Resources:

  # Wildcard cert covers ozil.cc and api.ozil.cc
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: ozil.cc
      SubjectAlternativeNames:
        - api.ozil.cc
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: ozil.cc
          HostedZoneId: !Ref HostedZoneId
        - DomainName: api.ozil.cc
          HostedZoneId: !Ref HostedZoneId

  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: ozil-site
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: ozil-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - ozil.cc
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          # CachingDisabled — no caching; useful during active development
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: ozil.cc
      Type: A
      AliasTarget:
        # CloudFront hosted zone ID is always Z2FDTNDATAQYW2
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName

Outputs:
  CertificateArn:
    Value: !Ref Certificate
    Description: Pass this to api.yaml as CertificateArn parameter
    Export:
      Name: ozil-CertificateArn

  DistributionId:
    Value: !Ref Distribution
    Description: CloudFront distribution ID (needed for cache invalidation)
    Export:
      Name: ozil-DistributionId

  SiteBucketName:
    Value: !Ref SiteBucket
    Description: S3 bucket for static frontend files
    Export:
      Name: ozil-SiteBucketName
