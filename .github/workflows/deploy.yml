name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # CloudFormation deploy is a no-op if nothing changed in the template.
      # --no-fail-on-empty-changeset prevents a 255 exit code when there are no changes.

      - name: Deploy hosting stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/hosting.yaml \
            --stack-name ozil-hosting \
            --parameter-overrides HostedZoneId=${{ secrets.HOSTED_ZONE_ID }} \
            --region us-east-1 \
            --no-fail-on-empty-changeset

      - name: Deploy API stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/api.yaml \
            --stack-name ozil-api \
            --parameter-overrides HostedZoneId=${{ secrets.HOSTED_ZONE_ID }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region us-east-1 \
            --no-fail-on-empty-changeset

      # Always push lambda/index.js as the authoritative Lambda code.
      # This overrides whatever ZipFile the CloudFormation stack deployed.
      - name: Update Lambda code
        run: |
          zip -j lambda.zip lambda/index.js
          aws lambda update-function-code \
            --function-name ozil-tracker \
            --zip-file fileb://lambda.zip \
            --region us-east-1

      - name: Sync frontend to S3
        run: |
          aws s3 sync app/ s3://ozil-site/ --delete --region us-east-1

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudformation list-exports \
            --query "Exports[?Name=='ozil-DistributionId'].Value" \
            --output text \
            --region us-east-1)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
